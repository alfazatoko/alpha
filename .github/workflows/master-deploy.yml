name: Full Deployment (Web & Android)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  # JOB 1: Build & Deploy Website
  deploy-web:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALFALIA }}'
          channelId: live
          projectId: alfalia
        continue-on-error: true # Tetap lanjut walau secret belum disetup

  # JOB 2: Build APK Android
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sinkronisasi Capacitor
        run: npx cap sync android

      - name: Build APK (Mode Debug)
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ALFAZA-ALPHA-APP
          path: android/app/build/outputs/apk/debug/app-debug.apk
