name: Full Deployment (Web & Android)

on:
  push:
    branches:
      - master # Jalankan otomatis jika ada kode baru di branch master
  workflow_dispatch: # Mengizinkan Anda menekan tombol "Run workflow" secara manual di GitHub

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALFALIA }}'
          channelId: live
          projectId: alfalia

      - name: Setup Java JDK (Dibutuhkan untuk Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sinkronisasi ke Android (Capacitor)
        run: npx cap sync android

      - name: Beri Izin Eksekusi untuk Gradle
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build APK (Mode Debug)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload File APK ke Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ALFAZA-ALPHA-APP.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
